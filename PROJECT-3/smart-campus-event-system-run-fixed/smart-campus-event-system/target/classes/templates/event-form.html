<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head><title>Event Form</title><link rel="stylesheet" th:href="@{/css/style.css}"></head><body><div th:replace="~{fragments :: nav}"></div><main class="auth"><form class="glass form" th:action="@{/admin/events/save}" th:object="${event}" method="post"><h1>Event Details</h1><input type="hidden" th:field="*{id}"><input th:field="*{title}" placeholder="Title"><input th:field="*{department}" placeholder="Department"><input th:field="*{type}" placeholder="Type"><input th:field="*{eventDate}" type="date"><input th:field="*{venue}" placeholder="Venue"><input th:field="*{seats}" type="number" placeholder="Seats"><input th:field="*{imageUrl}" placeholder="/images/event1.svg"><textarea th:field="*{description}" placeholder="Description"></textarea><button class="btn">Save Event</button></form></main></body></html>
