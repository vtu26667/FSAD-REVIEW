<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head><title>Smart Campus</title><link rel="stylesheet" th:href="@{/css/style.css}"></head><body><div th:replace="~{fragments :: nav}"></div>
<section class="hero"><div class="glass reveal"><span class="tag">Vintage Green Campus Portal</span><h1>Manage Events, Workshops & Seminars Beautifully</h1><p>Browse events, verify email with OTP, register instantly, submit feedback and download premium PDF tickets.</p><a class="btn" th:href="@{/events}">Explore Events</a></div><img class="hero-img" th:src="@{/images/campus.svg}"/></section>
<section class="grid"><div class="card" th:each="e:${events}"><img th:src="${e.imageUrl}"><h3 th:text="${e.title}"></h3><p th:text="${e.description}"></p><a class="btn small" th:href="@{/events}">View Details</a></div></section></body></html>
