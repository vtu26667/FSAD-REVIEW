<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head><title>Dashboard</title><link rel="stylesheet" th:href="@{/css/style.css}"></head><body><div th:replace="~{fragments :: nav}"></div><main class="page"><div class="section-head"><span class="tag">Student Dashboard</span><h1 th:text="'Hello, '+${user.name}"></h1><p>Your registrations, tickets and feedback are shown here.</p></div><section th:if="${#lists.isEmpty(registrations)}" class="glass empty-box"><h2>No registered events yet</h2><p>Events are available below. Register to generate your premium PDF ticket.</p><a class="btn" th:href="@{/events}">Explore Events</a></section><section class="grid" th:if="${!#lists.isEmpty(registrations)}"><div class="card" th:each="r:${registrations}"><h3 th:text="${r.event.title}"></h3><p><b>Date:</b> <span th:text="${r.event.eventDate}"></span></p><p><b>Name:</b> <span th:text="${r.fullName}"></span></p><p><b>Roll No:</b> <span th:text="${r.rollNo}"></span></p><p><b>Attendees:</b> <span th:text="${r.attendees}"></span></p><p><b>Status:</b> <span th:text="${r.status}"></span></p><a class="btn" th:href="@{/ticket/{id}(id=${r.id})}">Download PDF Ticket</a><form th:action="@{/feedback/{id}(id=${r.id})}" method="post"><textarea name="feedback" placeholder="Feedback"></textarea><button class="btn small">Submit Feedback</button></form></div></section><h2>Available Events</h2><section class="grid"><div class="card event-card" th:each="e:${events}"><img th:src="${e.imageUrl}"><h3 th:text="${e.title}"></h3><p th:text="${e.description}"></p><a class="btn small" th:href="@{/events/{id}/register(id=${e.id})}">Register</a></div></section></main></body></html>
