<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head><title>Event Registration</title><link rel="stylesheet" th:href="@{/css/style.css}"></head><body><div th:replace="~{fragments :: nav}"></div><main class="auth wide-auth"><form class="glass form wide-form" th:action="@{/events/{id}/register(id=${event.id})}" th:object="${registration}" method="post"><span class="tag">Premium Event Registration</span><h1 th:text="${event.title}"></h1><p>Fill all required details. These details will be printed on your downloadable PDF ticket.</p><div class="form-grid"><input th:field="*{fullName}" placeholder="Full Name *" required><input th:field="*{personalEmail}" placeholder="Email *" required><input th:field="*{phone}" placeholder="Phone Number *" required><input th:field="*{rollNo}" placeholder="Roll Number / ID *" required><input th:field="*{department}" placeholder="Department *" required><input th:field="*{academicYear}" placeholder="Academic Year / Semester"><input type="number" min="1" max="10" th:field="*{attendees}" placeholder="Number of Attendees *" required></div><textarea th:field="*{specialRequirements}" placeholder="Special requirements / notes"></textarea><button class="btn">Confirm Registration</button><a class="link" th:href="@{/events}">Back to Events</a></form></main></body></html>
