<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head><title>Admin</title><link rel="stylesheet" th:href="@{/css/style.css}"><script src="https://cdn.jsdelivr.net/npm/chart.js"></script></head><body><div th:replace="~{fragments :: nav}"></div><main class="page"><h1>Admin Dashboard</h1><a class="btn" th:href="@{/admin/events/new}">Add New Event</a><div class="stats"><div class="glass"><h2 th:text="${#lists.size(events)}"></h2><p>Total Events</p></div><div class="glass"><h2 th:text="${#lists.size(registrations)}"></h2><p>Total Registrations</p></div></div><canvas id="chart"></canvas><table><tr><th>Event</th><th>Date</th><th>Action</th></tr><tr th:each="e:${events}"><td th:text="${e.title}"></td><td th:text="${e.eventDate}"></td><td><a th:href="@{/admin/events/edit/{id}(id=${e.id})}">Edit</a> | <a th:href="@{/admin/events/delete/{id}(id=${e.id})}">Delete</a></td></tr></table></main><script th:inline="javascript">let data=[[${chartData}]];new Chart(document.getElementById('chart'),{type:'bar',data:{labels:data.map(x=>x[0]),datasets:[{label:'Registrations',data:data.map(x=>x[1])}]}});</script></body></html>
