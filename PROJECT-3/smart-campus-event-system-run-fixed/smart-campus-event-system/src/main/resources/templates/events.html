<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head><title>Events</title><link rel="stylesheet" th:href="@{/css/style.css}"></head><body><div th:replace="~{fragments :: nav}"></div><main class="page"><div class="section-head"><span class="tag">Browse & Register</span><h1>Upcoming Campus Events</h1><p>Choose an event and fill required personal details before PDF ticket generation.</p></div><form class="filters"><input name="department" placeholder="Department"><input name="type" placeholder="Type"><button class="btn">Search</button></form><section class="grid"><div class="card event-card" th:each="e:${events}"><img th:src="${e.imageUrl}"><h3 th:text="${e.title}"></h3><p><b>Date:</b> <span th:text="${e.eventDate}"></span></p><p><b>Venue:</b> <span th:text="${e.venue}"></span></p><p><b>Department:</b> <span th:text="${e.department}"></span> | <span th:text="${e.type}"></span></p><p th:text="${e.description}"></p><a class="btn" th:href="@{/events/{id}/register(id=${e.id})}">Register Now</a></div></section></main></body></html>
