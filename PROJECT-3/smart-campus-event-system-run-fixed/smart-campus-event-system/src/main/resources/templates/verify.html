<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head><title>Verify OTP</title><link rel="stylesheet" th:href="@{/css/style.css}"></head><body><div th:replace="~{fragments :: nav}"></div><main class="auth"><form class="glass form" th:action="@{/verify}" method="post"><h1>Email OTP Verification</h1><p>Enter the OTP sent to your email. If mail is disabled, check Eclipse console.</p><p class="err" th:text="${error}"></p><input name="email" th:value="${email}" placeholder="Email" required><input name="otp" placeholder="6 digit OTP" required><button class="btn">Verify OTP</button></form></main></body></html>
